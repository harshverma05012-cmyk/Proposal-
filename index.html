<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proposal</title>

<style>
body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family:Arial,sans-serif;
overflow:hidden;
}

.card{
text-align:center;
background:rgba(255,255,255,0.25);
padding:30px;
border-radius:20px;
box-shadow:0 8px 25px rgba(0,0,0,0.2);
}

h1,h2,h3,p{
color:white;
}

button{
padding:12px 22px;
margin:10px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
}

#yes{
background:white;
color:#e91e63;
}

#no{
position:absolute;
background:white;
}

#message{
display:none;
font-size:28px;
color:white;
margin-top:20px;
font-weight:bold;
}
</style>

</head>
<body>

<div class="card">
<h3>From: Buddhu &#10084;&#65039;</h3>

<h1>Will you forever be mine?</h1>

<h2>Paaru &#128149;</h2>

<p>Love you baby &#10084;&#65039;</p>

<button id="yes">Yes &#10084;&#65039;</button>
<button id="no">No &#128514;</button>

<div id="message">
I Love You Forever &#10084;&#65039;
</div>

</div>

<script>
const no=document.getElementById("no");

no.addEventListener("click",()=>{
no.style.left=Math.random()*(window.innerWidth-100)+"px";
no.style.top=Math.random()*(window.innerHeight-60)+"px";
});

document.getElementById("yes").addEventListener("click",()=>{
document.getElementById("message").style.display="block";
});
</script>

</body>
</html>
